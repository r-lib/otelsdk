on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: linux.yaml

permissions: read-all

jobs:
  check:
    runs-on: ubuntu-latest
    name: ${{ matrix.config.container }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { container: rockylinux:8, r: release }
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Install R
        run: |
          yum install -y patch findutils perl
          yum install -y https://github.com/r-lib/rig/releases/download/latest/r-rig-latest-1.$(arch).rpm
          curl -o /usr/local/bin/checkbashisms \
              https://raw.githubusercontent.com/r-hub/containers/main/dependencies/checkbashisms/checkbashisms && \
              chmod +x /usr/local/bin/checkbashisms
          rig add ${{ matrix.config.r }}
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          NOT_CRAN: true
